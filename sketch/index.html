<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrussSketch - TrussC Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: #252526;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3c3c3c;
            height: 48px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 500;
            color: #cccccc;
        }

        .header h1 span {
            color: #569cd6;
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .controls-spacer {
            width: 16px;
        }

        /* Icon buttons (play, stop, fullscreen) */
        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-icon:hover {
            transform: scale(1.05);
        }

        .btn-icon:active {
            transform: scale(0.95);
        }

        .btn-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .btn-play svg {
            width: 20px;
            height: 20px;
        }

        /* Stopped state (default) */
        .btn-play {
            background: #6e7681;
        }

        .btn-play:hover {
            background: #848d97;
        }

        .btn-stop-icon {
            background: #9e4a4a;
        }

        .btn-stop-icon:hover {
            background: #b35a5a;
        }

        /* Running state */
        .btn-play.running {
            background: #2ea043;
        }

        .btn-play.running:hover {
            background: #3fb950;
        }

        .btn-stop-icon.running {
            background: #6e7681;
        }

        .btn-stop-icon.running:hover {
            background: #848d97;
        }

        /* Auto-run mode */
        .btn-play {
            position: relative;
        }

        .btn-play.auto-run::after {
            content: 'AUTO';
            position: absolute;
            left: calc(50% + 1px);
            bottom: 5px;
            transform: translateX(-50%);
            font-size: 7px;
            font-weight: bold;
            color: white;
        }

        .btn-play.auto-run svg {
            transform: translateY(-3px) scale(0.8);
        }

        /* Pulse effect for auto-run trigger */
        @keyframes button-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.85); }
            100% { transform: scale(1); }
        }

        .btn-play.pulse {
            animation: button-pulse 0.15s ease;
        }

        .btn-fullscreen {
            background: #6e7681;
        }

        .btn-fullscreen:hover {
            background: #848d97;
        }

        .btn-record {
            background: #6e7681;
        }

        .btn-record:hover {
            background: #848d97;
        }

        .btn-record svg {
            fill: #ccc;
        }

        .btn-record.recording {
            background: #dc3545;
            animation: pulse-record 1s infinite;
        }

        .btn-record.recording svg {
            fill: white;
        }

        .btn-record.recording:hover {
            background: #e35d6a;
        }

        @keyframes pulse-record {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Text buttons (save, load, share, help) */
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            background: #3c3c3c;
            color: #cccccc;
        }

        .btn:hover {
            background: #4a4a4a;
        }

        .btn-help {
            padding: 6px 10px;
            font-weight: 600;
            font-size: 14px;
        }

        .main {
            display: flex;
            height: calc(100vh - 48px);
        }

        .editor-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
        }

        /* File tabs */
        .file-tabs {
            display: flex;
            background: #252526;
            border-bottom: 1px solid #3c3c3c;
            height: 32px;
            align-items: flex-end;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .file-tabs::-webkit-scrollbar {
            height: 4px;
        }

        .file-tabs::-webkit-scrollbar-thumb {
            background: #3c3c3c;
        }

        .file-tab {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: #2d2d2d;
            border: 1px solid #3c3c3c;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            margin-left: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .file-tab:first-child {
            margin-left: 8px;
        }

        .file-tab:hover {
            background: #3c3c3c;
        }

        .file-tab.active {
            background: #1e1e1e;
            color: #d4d4d4;
            border-bottom: 1px solid #1e1e1e;
            margin-bottom: -1px;
        }

        .file-tab.dragging {
            opacity: 0.5;
        }

        .file-tab.drag-over {
            border-left: 2px solid #58a6ff;
            padding-left: 6px;
        }

        .file-tab-name {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-tab-close {
            margin-left: 8px;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: opacity 0.15s, background 0.15s;
        }

        .file-tab-close:hover {
            opacity: 1;
            background: #5a5a5a;
        }

        .file-tab-close svg {
            width: 10px;
            height: 10px;
            fill: currentColor;
        }

        .file-tab-add {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            margin-left: 4px;
            border-radius: 4px;
            cursor: pointer;
            color: #888;
            transition: background 0.15s, color 0.15s;
        }

        .file-tab-add:hover {
            background: #3c3c3c;
            color: #d4d4d4;
        }

        .file-tab-add svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* File panel (left sidebar) */
        .file-panel {
            width: 200px;
            min-width: 200px;
            flex-shrink: 0;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.2s, min-width 0.2s;
        }

        .file-panel.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
        }

        .file-panel-header {
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #888;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-panel-section {
            padding: 4px 0;
        }

        .file-panel-section-header {
            padding: 4px 12px;
            font-size: 11px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .file-panel-section-header:hover {
            background: #2a2a2a;
        }

        .file-panel-section-header svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
            transition: transform 0.15s;
        }

        .file-panel-section.collapsed .file-panel-section-header svg {
            transform: rotate(-90deg);
        }

        .file-panel-section.collapsed .file-panel-items {
            display: none;
        }

        .file-panel-item {
            padding: 4px 12px 4px 24px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ccc;
        }

        .file-panel-item:hover {
            background: #2a2d2e;
        }

        .file-panel-item.active {
            background: #094771;
        }

        .file-panel-item-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .file-panel-item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-panel-item-size {
            margin-left: auto;
            font-size: 10px;
            color: #666;
        }

        .file-panel-item-delete {
            opacity: 0;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .file-panel-item:hover .file-panel-item-delete {
            opacity: 0.5;
        }

        .file-panel-item-delete:hover {
            opacity: 1 !important;
            background: #5a5a5a;
        }

        .file-panel-item-delete svg {
            width: 10px;
            height: 10px;
            fill: currentColor;
        }

        .file-panel-drop-zone {
            margin: 8px;
            padding: 16px;
            border: 2px dashed #3c3c3c;
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            color: #666;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .file-panel-drop-zone:hover {
            border-color: #007acc;
            background: rgba(0, 122, 204, 0.1);
        }

        .file-panel-drop-zone.drag-over {
            border-color: #007acc;
            background: rgba(0, 122, 204, 0.2);
        }

        .btn-files {
            background: #3c3c3c;
            padding: 6px 10px;
        }

        .btn-files.active {
            background: #007acc;
        }

        #editor {
            flex: 1;
            width: 100%;
        }

        .canvas-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas {
            outline: none;
        }

        #canvas:focus {
            outline: none;
        }

        .console {
            height: 240px;
            background: #1e1e1e;
            border-top: 1px solid #3c3c3c;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
        }

        .resizer {
            width: 6px;
            background: #3c3c3c;
            cursor: col-resize;
            transition: background 0.2s;
        }

        .resizer:hover,
        .resizer.active {
            background: #007acc;
        }

        .resizer-h {
            height: 6px;
            background: #3c3c3c;
            cursor: row-resize;
            transition: background 0.2s;
        }

        .resizer-h:hover,
        .resizer-h.active {
            background: #007acc;
        }

        .console-line {
            margin: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .console-line.error {
            color: #f14c4c;
        }

        .console-line.notice {
            color: #3794ff;
        }

        .console-line.success {
            color: #89d185;
        }

        .status {
            padding: 4px 16px;
            background: #007acc;
            color: white;
            font-size: 12px;
        }

        .status.error {
            background: #f14c4c;
        }

        .status.ready {
            background: #89d185;
            color: #1e1e1e;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
        }

        .loading-spinner {
            border: 3px solid #3c3c3c;
            border-top: 3px solid #007acc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Share modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            border-radius: 16px;
            padding: 28px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: modal-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            overflow: hidden;
            background: #1e1e2e;
        }

        .modal::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                0deg,
                rgba(100, 50, 75, 0.95),
                rgba(75, 50, 100, 0.95),
                rgba(50, 75, 110, 0.95),
                rgba(50, 100, 90, 0.95),
                rgba(75, 100, 50, 0.95),
                rgba(100, 90, 50, 0.95),
                rgba(100, 65, 65, 0.95),
                rgba(100, 50, 75, 0.95)
            );
            background-size: 100% 400%;
            animation: rainbow-flow 4s ease infinite,
                       rainbow-rotate 6s linear infinite;
            z-index: 0;
        }

        .modal > * {
            position: relative;
            z-index: 1;
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }

        @keyframes rainbow-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .wiggle-emoji {
            display: inline-block;
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        @keyframes modal-pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: white;
        }

        .modal p {
            margin: 0 0 20px 0;
            color: #b8b8c8;
            font-size: 14px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .modal-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        .modal-btn-x {
            background: linear-gradient(135deg, #1d9bf0 0%, #0d8bd9 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(29, 155, 240, 0.3);
        }

        .modal-btn-x:hover {
            box-shadow: 0 6px 16px rgba(29, 155, 240, 0.4);
        }

        .modal-btn-bluesky {
            background: linear-gradient(135deg, #0085ff 0%, #0066cc 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 133, 255, 0.3);
        }

        .modal-btn-bluesky:hover {
            box-shadow: 0 6px 16px rgba(0, 133, 255, 0.4);
        }

        .modal-btn-copy {
            background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
        }

        .modal-btn-copy:hover {
            box-shadow: 0 6px 16px rgba(88, 101, 242, 0.4);
        }

        .modal-btn-close {
            background: transparent;
            color: #888;
            width: 100%;
            margin-top: 12px;
            font-weight: 500;
        }

        .modal-btn-close:hover {
            color: white;
            transform: none;
        }

    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1>Truss<span>Sketch</span></h1>
        <div class="controls">
            <!-- Playback controls -->
            <button class="btn-icon btn-play" id="runBtn" title="Run (click again for auto-run)">
                <svg viewBox="0 0 24 24"><polygon points="7,4 20,12 7,20" transform="translate(0.7,0)"/></svg>
            </button>
            <button class="btn-icon btn-stop-icon" id="stopBtn" onclick="stopScript()" title="Stop">
                <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
            </button>
            <button class="btn-icon btn-fullscreen" onclick="toggleFullscreen()" title="Fullscreen">
                <svg viewBox="0 0 24 24"><path d="M2 2h7v2H4v5H2V2zm13 0h7v7h-2V4h-5V2zM2 15h2v5h5v2H2v-7zm18 0h2v7h-7v-2h5v-5z"/></svg>
            </button>
            <button class="btn-icon btn-record" id="recordBtn" onclick="toggleRecording()" title="Record video">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
            </button>
            <div class="controls-spacer"></div>
            <!-- File controls -->
            <button class="btn btn-files" id="filesBtn" onclick="toggleFilePanel()">Files</button>
            <button class="btn" id="saveBtn">Save</button>
            <button class="btn" onclick="loadScript()">Load</button>
            <button class="btn" id="shareBtn" onclick="shareScript()">Share</button>
            <a href="reference/" class="btn btn-help" style="text-decoration:none;" title="API Reference">?</a>
        </div>
    </div>

    <div class="main">
        <div class="file-panel collapsed" id="filePanel">
            <div class="file-panel-header">
                <span>Explorer</span>
            </div>
            <div class="file-panel-section" id="sourcesSection">
                <div class="file-panel-section-header" onclick="toggleSection('sourcesSection')">
                    <svg viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                    Sources
                </div>
                <div class="file-panel-items" id="sourcesList">
                    <!-- Generated by JS -->
                </div>
            </div>
            <div class="file-panel-section" id="assetsSection">
                <div class="file-panel-section-header" onclick="toggleSection('assetsSection')">
                    <svg viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                    Assets
                </div>
                <div class="file-panel-items" id="assetsList">
                    <!-- Generated by JS -->
                </div>
            </div>
            <div class="file-panel-drop-zone" id="dropZone" onclick="addAssetFromPicker()">
                Drop files here<br>or click to add
            </div>
        </div>
        <div class="editor-panel" id="editorPanel">
            <div class="file-tabs" id="fileTabs">
                <!-- Tabs will be generated by JavaScript -->
            </div>
            <div id="editor"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="canvas-panel" id="canvasPanel">
            <div class="status" id="status">Loading...</div>
            <div class="canvas-container" id="canvasContainer">
                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <span>Loading TrussSketch engine...</span>
                </div>
                <canvas id="canvas" tabindex="-1" style="display:none; width:600px; height:600px;"></canvas>
            </div>
            <div class="resizer-h" id="resizerH"></div>
            <div class="console" id="console"></div>
        </div>
    </div>

    <script src="trusssketch-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        let editor;
        let isModified = false;
        let editorReady = false;
        let engineReady = false;

        // Auto-run when both editor and engine are ready
        function tryAutoRun() {
            if (editorReady && engineReady) {
                runScript();
                if (editor) editor.focus();
            }
        }

        // Random project name generator
        let randomNameData = null;
        fetch('random-names.json')
            .then(r => r.json())
            .then(data => { randomNameData = data; })
            .catch(() => { randomNameData = { adjectives: ['my'], nouns: ['sketch'] }; });

        function generateRandomName() {
            if (!randomNameData) return 'myCode';
            const adj = randomNameData.adjectives[Math.floor(Math.random() * randomNameData.adjectives.length)];
            const noun = randomNameData.nouns[Math.floor(Math.random() * randomNameData.nouns.length)];
            // Capitalize first letter of noun
            return adj + noun.charAt(0).toUpperCase() + noun.slice(1) + 'Code';
        }

        // i18n - Localization
        const i18n = {
            en: {
                videoSaved: '🎬 Nice one!',
                shareDesc: 'Your video is ready! Share it with the world ✨\nJust attach the downloaded file!',
                close: 'Maybe later',
                copy: 'Copy',
                assetWarning: 'Heads up! This project has assets (images, etc.) that can\'t be shared via URL.\n\nOnly the code will be shared. Cool?',
                shareText: 'Made with TrussSketch ✨',
            },
            ja: {
                videoSaved: '🎬 できた！',
                shareDesc: '動画の準備完了！みんなにシェアしよう ✨\nダウンロードしたファイルを添付してね！',
                close: 'あとで',
                copy: 'コピー',
                assetWarning: 'ちょっと待って！このプロジェクトにはアセット（画像など）があるけど、URLには含められないんだ。\n\nコードだけシェアするけどOK？',
                shareText: 'TrussSketchで作ったよ ✨',
            },
            'zh-Hans': {
                videoSaved: '🎬 搞定！',
                shareDesc: '视频准备好啦！快分享给大家吧 ✨\n别忘了附上下载的文件哦！',

        function getLang() {
            const lang = navigator.language || 'en';
            if (lang.startsWith('ja')) return 'ja';
            if (lang.startsWith('ko')) return 'ko';
            if (lang.startsWith('es')) return 'es';
            if (lang.startsWith('pt')) return 'pt';
            // Traditional Chinese: Taiwan, Hong Kong, Macau
            if (lang === 'zh-TW' || lang === 'zh-HK' || lang === 'zh-MO' || lang === 'zh-Hant') return 'zh-Hant';
            // Simplified Chinese: China, Singapore
            if (lang.startsWith('zh')) return 'zh-Hans';
            return 'en';
        }

        function t(key) {
            const lang = getLang();
            return i18n[lang][key] || i18n.en[key];
        }

        // Multi-file management
        const files = new Map();  // filename -> { model: Monaco.ITextModel, savedContent: string }
        let currentFile = 'main.as';

        // Assets management (images, sounds, etc.)
        const assets = new Map();  // filename -> { blob: Blob, url: string (object URL) }

        // File panel state
        let filePanelOpen = false;

        // Auto-run mode
        let autoRunEnabled = false;
        let autoRunTimer = null;
        const AUTO_RUN_DELAY = 500;  // ms after typing stops

        function scheduleAutoRun() {
            if (!autoRunEnabled) return;
            if (autoRunTimer) clearTimeout(autoRunTimer);
            autoRunTimer = setTimeout(() => {
                autoRunTimer = null;
                // Pulse effect
                const runBtn = document.getElementById('runBtn');
                if (runBtn) {
                    runBtn.classList.remove('pulse');
                    void runBtn.offsetWidth;  // Force reflow
                    runBtn.classList.add('pulse');
                }
                runScript();
            }, AUTO_RUN_DELAY);
        }

        function updateRunButtonState() {
            const runBtn = document.getElementById('runBtn');

        // Get file icon based on extension
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'as': '<svg viewBox="0 0 16 16"><path d="M4 2h5l3 3v9H4V2z" fill="none" stroke="#569cd6" stroke-width="1.2"/></svg>',

        // Format file size
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        // Render file panel
        function renderFilePanel() {
            // Sources
            const sourcesList = document.getElementById('sourcesList');
            sourcesList.innerHTML = '';
            for (const [name, file] of files) {
                const item = document.createElement('div');
                item.className = 'file-panel-item' + (name === currentFile ? ' active' : '');
                const displayName = name.replace(/\.as$/, '');
                item.innerHTML = `
                    <span class="file-panel-item-icon">${getFileIcon(name)}</span>
                    <span class="file-panel-item-name">${displayName}</span>
                `;
                item.onclick = () => switchToFile(name);
                sourcesList.appendChild(item);
            }

            // Assets
            const assetsList = document.getElementById('assetsList');
            assetsList.innerHTML = '';
            if (assets.size === 0) {
                assetsList.innerHTML = '<div class="file-panel-item" style="color:#666;cursor:default;">No assets</div>';
            } else {
                for (const [name, asset] of assets) {
                    const item = document.createElement('div');
                    item.className = 'file-panel-item';
                    item.innerHTML = `
                        <span class="file-panel-item-icon">${getFileIcon(name)}</span>
                        <span class="file-panel-item-name">${name}</span>
                        <span class="file-panel-item-size">${formatSize(asset.blob.size)}</span>
                        <span class="file-panel-item-delete" onclick="event.stopPropagation(); removeAsset('${name}')">
                            <svg viewBox="0 0 16 16"><path d="M4 4l8 8m0-8l-8 8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                        </span>
                    `;
                    item.onclick = () => previewAsset(name);
                    item.ondblclick = () => insertAssetPath(name);
